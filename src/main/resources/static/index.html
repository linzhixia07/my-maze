<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人迷宫竞技</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            padding: 16px;
        }
        .game {
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }
        .arena {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .player-panel {
            width: 180px;
            text-align: left;
        }
        .player-panel label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #3f4957;
            font-weight: bold;
        }
        .player-panel input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            border: 1px solid #b7c2d0;
            border-radius: 8px;
            font-size: 14px;
        }
        canvas {
            width: 100%;
            max-width: 700px;
            background: #f7fbff;
            border: 3px solid #6d7786;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
        }
        .panel {
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            background: #4caf50;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="game">
    <div class="arena">
        <div class="player-panel">
            <label for="playerAName">玩家 A 名字</label>
            <input id="playerAName" type="text" value="玩家A" maxlength="16">
        </div>
        <canvas id="mazeCanvas" width="700" height="700"></canvas>
        <div class="player-panel">
            <label for="playerBName">玩家 B 名字</label>
            <input id="playerBName" type="text" value="玩家B" maxlength="16">
        </div>
    </div>
    <div class="panel">
        <button id="resetBtn">重制游戏</button>
    </div>
</div>
<script>
    (function () {
        var canvas = document.getElementById("mazeCanvas");
        var ctx = canvas.getContext("2d");
        var playerAInput = document.getElementById("playerAName");
        var playerBInput = document.getElementById("playerBName");
        var maze = [];
        var players = {};
        var goal = null;
        var breadcrumbs = {};
        var cellSize = 24;
        var inputLocked = false;
        var winnerMessage = "";
        var keyPressed = {};
        var moveLoopId = null;
        var keyMapping = {
            w: {playerId: "A", direction: "UP"},
            W: {playerId: "A", direction: "UP"},
            s: {playerId: "A", direction: "DOWN"},
            S: {playerId: "A", direction: "DOWN"},
            a: {playerId: "A", direction: "LEFT"},
            A: {playerId: "A", direction: "LEFT"},
            d: {playerId: "A", direction: "RIGHT"},
            D: {playerId: "A", direction: "RIGHT"},
            ArrowUp: {playerId: "B", direction: "UP"},
            ArrowDown: {playerId: "B", direction: "DOWN"},
            ArrowLeft: {playerId: "B", direction: "LEFT"},
            ArrowRight: {playerId: "B", direction: "RIGHT"}
        };

        function init() {
            document.getElementById("resetBtn").addEventListener("click", generateMaze);
            window.addEventListener("keydown", onKeyDown);
            window.addEventListener("keyup", onKeyUp);
            startMoveLoop();
            generateMaze();
        }

        function onKeyDown(event) {
            if (inputLocked) {
                return;
            }
            if (keyMapping[event.key]) {
                event.preventDefault();
                keyPressed[event.key] = true;
            }
        }

        function onKeyUp(event) {
            if (keyPressed[event.key]) {
                keyPressed[event.key] = false;
            }
        }

        function startMoveLoop() {
            if (moveLoopId) {
                clearInterval(moveLoopId);
            }
            moveLoopId = setInterval(function () {
                if (inputLocked) {
                    return;
                }
                var actionA = currentDirectionForPlayer("A");
                var actionB = currentDirectionForPlayer("B");
                if (!actionA && !actionB) {
                    return;
                }
                if (actionA && actionB) {
                    Promise.all([move(actionA), move(actionB)]).catch(function () {});
                } else if (actionA) {
                    move(actionA);
                } else {
                    move(actionB);
                }
            }, 95);
        }

        function currentDirectionForPlayer(playerId) {
            var keys = playerId === "A"
                ? ["w", "W", "s", "S", "a", "A", "d", "D"]
                : ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"];
            for (var i = 0; i < keys.length; i++) {
                if (keyPressed[keys[i]]) {
                    return keyMapping[keys[i]];
                }
            }
            return null;
        }

        function generateMaze() {
            inputLocked = false;
            winnerMessage = "";
            keyPressed = {};
            fetch("/api/maze/generate", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({cols: 21, rows: 21})
            })
            .then(parseJson)
            .then(applyState)
            .catch(function () {});
        }

        function move(action) {
            return fetch("/api/maze/move", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({playerId: action.playerId, direction: action.direction})
            })
            .then(parseJson)
            .then(function (data) {
                applyState(data);
                if (data.gameOver) {
                    inputLocked = true;
                    winnerMessage = getWinnerMessage(data.winner);
                    render();
                }
            })
            .catch(function () {});
        }

        function applyState(data) {
            if (data.maze) {
                maze = data.maze;
            }
            players = data.players || {};
            goal = data.goal;
            breadcrumbs = data.breadcrumbs || {};
            render();
        }

        function parseJson(response) {
            if (!response.ok) {
                throw new Error("request failed");
            }
            return response.json();
        }

        function render() {
            if (!maze || maze.length === 0) {
                return;
            }
            var rows = maze.length;
            var cols = maze[0].length;
            cellSize = Math.floor(Math.min(canvas.width / cols, canvas.height / rows));
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#f4f8fc";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (var y = 0; y < rows; y++) {
                for (var x = 0; x < cols; x++) {
                    drawCell(x, y, maze[y][x]);
                }
            }
            drawBreadcrumbs();
            drawWallOutline();
            drawGoal();
            drawPlayers();
            drawWinnerOverlay();
        }

        function drawCell(x, y, value) {
            var isWall = (value & 2) === 2;
            ctx.fillStyle = isWall ? "#d7dee7" : "#f6fbff";
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }

        function drawWallOutline() {
            ctx.strokeStyle = "#5b6672";
            ctx.lineWidth = 1;
            for (var y = 0; y < maze.length; y++) {
                for (var x = 0; x < maze[0].length; x++) {
                    if ((maze[y][x] & 2) === 2) {
                        ctx.beginPath();
                        ctx.rect(x * cellSize + 0.5, y * cellSize + 0.5, cellSize - 1, cellSize - 1);
                        ctx.stroke();
                    }
                }
            }
        }

        function drawBreadcrumbs() {
            drawPlayerBreadcrumb("A", "rgba(47,128,237,0.38)");
            drawPlayerBreadcrumb("B", "rgba(235,87,87,0.38)");
        }

        function drawPlayerBreadcrumb(playerId, color) {
            var path = breadcrumbs[playerId] || [];
            ctx.fillStyle = color;
            for (var i = 0; i < path.length; i++) {
                var p = path[i];
                ctx.beginPath();
                ctx.arc(p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2, cellSize / 8, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawGoal() {
            if (!goal) {
                return;
            }
            ctx.fillStyle = "#ff9f1c";
            ctx.font = Math.floor(cellSize * 0.8) + "px serif";
            ctx.fillText("★", goal.x * cellSize + cellSize * 0.15, goal.y * cellSize + cellSize * 0.85);
        }

        function drawPlayers() {
            drawPlayer("A", "#2f80ed");
            drawPlayer("B", "#eb5757");
        }

        function drawPlayer(playerId, color) {
            var p = players[playerId];
            if (!p) {
                return;
            }
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2, cellSize / 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawWinnerOverlay() {
            if (!winnerMessage || !goal) {
                return;
            }
            var centerX = goal.x * cellSize + cellSize / 2;
            var centerY = goal.y * cellSize + cellSize / 2;
            var fontSize = Math.max(28, Math.floor(cellSize * 1.15));
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = "bold " + fontSize + "px Arial";
            ctx.fillStyle = "rgba(20, 20, 20, 0.35)";
            ctx.fillText(winnerMessage, centerX + 3, centerY + 3);
            ctx.fillStyle = "#ffd54f";
            ctx.fillText(winnerMessage, centerX, centerY);
            ctx.textAlign = "start";
            ctx.textBaseline = "alphabetic";
        }

        function getWinnerMessage(winnerId) {
            var name = winnerId === "A" ? playerAInput.value : playerBInput.value;
            var safeName = (name || "").trim();
            if (!safeName) {
                safeName = winnerId === "A" ? "玩家A" : "玩家B";
            }
            return safeName + " 获得了胜利！";
        }

        init();
    })();
</script>
</body>
</html>
