<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童迷宫乐园</title>
    <style>
        body {
            margin: 0;
            font-family: "Arial", sans-serif;
            background: #fffbe6;
            color: #2f4858;
            display: flex;
            justify-content: center;
            padding: 16px;
        }
        .game {
            width: 100%;
            max-width: 760px;
            text-align: center;
        }
        canvas {
            width: 100%;
            max-width: 700px;
            background: #ffffff;
            border: 6px solid #6c63ff;
            border-radius: 14px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
        }
        .panel {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            background: #4caf50;
            color: #fff;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
<div class="game">
    <canvas id="mazeCanvas" width="700" height="700"></canvas>
</div>

<script>
    (function () {
        var canvas = document.getElementById("mazeCanvas");
        var ctx = canvas.getContext("2d");
        var maze = [];
        var players = {};
        var goal = null;
        var breadcrumbs = {};
        var cellSize = 40;

        function init() {
            generateMaze();
            window.addEventListener("keydown", onKeyDown);
        }

        function onKeyDown(event) {
            var mapping = {
                ArrowUp: {playerId: "A", direction: "UP"},
                ArrowDown: {playerId: "A", direction: "DOWN"},
                ArrowLeft: {playerId: "A", direction: "LEFT"},
                ArrowRight: {playerId: "A", direction: "RIGHT"},
                w: {playerId: "B", direction: "UP"},
                W: {playerId: "B", direction: "UP"},
                s: {playerId: "B", direction: "DOWN"},
                S: {playerId: "B", direction: "DOWN"},
                a: {playerId: "B", direction: "LEFT"},
                A: {playerId: "B", direction: "LEFT"},
                d: {playerId: "B", direction: "RIGHT"},
                D: {playerId: "B", direction: "RIGHT"}
            };
            var action = mapping[event.key];
            if (action) {
                event.preventDefault();
                move(action.playerId, action.direction);
                return;
            }
            if (event.key === "r" || event.key === "R") {
                event.preventDefault();
                generateMaze();
            }
        }

        function generateMaze() {
            fetch("/api/maze/generate", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({cols: 25, rows: 25})
            })
            .then(parseJson)
            .then(function (data) {
                maze = data.maze;
                players = data.players || {};
                goal = data.goal;
                breadcrumbs = data.breadcrumbs || {};
                render();
            })
            .catch(function () {});
        }

        function move(playerId, direction) {
            fetch("/api/maze/move", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({playerId: playerId, direction: direction})
            })
            .then(parseJson)
            .then(function (data) {
                players = data.players || {};
                goal = data.goal;
                breadcrumbs = data.breadcrumbs || {};
                render();
            })
            .catch(function () {});
        }

        function parseJson(response) {
            if (!response.ok) {
                throw new Error("request failed");
            }
            return response.json();
        }

        function render() {
            if (!maze || maze.length === 0) {
                return;
            }
            var rows = maze.length;
            var cols = maze[0].length;
            cellSize = Math.floor(Math.min(canvas.width / cols, canvas.height / rows));
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (var y = 0; y < rows; y++) {
                for (var x = 0; x < cols; x++) {
                    drawCell(x, y, maze[y][x]);
                }
            }
            drawBreadcrumbs();
            drawGoal();
            drawPlayers();
        }

        function drawCell(x, y, value) {
            var isWall = (value & 2) === 2;
            ctx.fillStyle = isWall ? "#3a3a3a" : "#e8f7ff";
            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }

        function drawBreadcrumbs() {
            drawPlayerBreadcrumb("A", "rgba(47,128,237,0.45)");
            drawPlayerBreadcrumb("B", "rgba(235,87,87,0.45)");
        }

        function drawPlayerBreadcrumb(playerId, color) {
            var path = breadcrumbs[playerId] || [];
            ctx.fillStyle = color;
            for (var i = 0; i < path.length; i++) {
                var p = path[i];
                ctx.beginPath();
                ctx.arc(p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2, cellSize / 8.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawGoal() {
            if (!goal) {
                return;
            }
            ctx.fillStyle = "#ff9f1c";
            ctx.font = Math.floor(cellSize * 0.8) + "px serif";
            ctx.fillText("★", goal.x * cellSize + cellSize * 0.15, goal.y * cellSize + cellSize * 0.85);
        }

        function drawPlayers() {
            drawPlayer("A", "#2f80ed");
            drawPlayer("B", "#eb5757");
        }

        function drawPlayer(playerId, color) {
            var p = players[playerId];
            if (!p) {
                return;
            }
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2, cellSize / 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        init();
    })();
</script>
</body>
</html>
