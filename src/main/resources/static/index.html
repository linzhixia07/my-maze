<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人迷宫竞技</title>
    <style>
        :root {
            --page-bg: #f4f6f9;
            --canvas-bg: #f7fbff;
            --text-main: #1f2933;
            --label-color: #3f4957;
            --input-border: #b7c2d0;
            --canvas-border: #6d7786;
            --badge-bg: rgba(255, 255, 255, 0.92);
            --badge-text: #1f2933;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--page-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.45s ease, color 0.45s ease;
        }
        .game {
            position: relative;
            width: 100%;
            max-width: 1100px;
            text-align: center;
            padding-top: 40px;
        }
        .level-badge {
            position: absolute;
            top: 0;
            right: 0;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 0.02em;
            background: var(--badge-bg);
            color: var(--badge-text);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: background-color 0.45s ease, color 0.45s ease, border-color 0.45s ease;
        }
        .arena {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .player-panel {
            width: 180px;
            text-align: left;
        }
        .player-panel label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--label-color);
            font-weight: bold;
            transition: color 0.45s ease;
        }
        .player-panel input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.85);
            color: var(--text-main);
            transition: border-color 0.45s ease, color 0.45s ease, background-color 0.45s ease;
        }
        canvas {
            width: 100%;
            max-width: 700px;
            background: var(--canvas-bg);
            border: 3px solid var(--canvas-border);
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
            transition: background-color 0.45s ease, border-color 0.45s ease;
        }
        .panel {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .panel button {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.35s ease, color 0.35s ease, opacity 0.25s ease, transform 0.12s ease;
        }
        .panel button:active:not(:disabled) {
            transform: scale(0.98);
        }
        .btn-reset-level {
            background: #546e7a;
            color: #fff;
        }
        .btn-reset-level:hover:not(:disabled) {
            background: #455a64;
        }
        .btn-next-level {
            background: #ff8f00;
            color: #fff;
        }
        .btn-next-level:hover:not(:disabled) {
            background: #f57c00;
        }
        .panel button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="game">
    <div id="levelBadge" class="level-badge">Level: 1/5</div>
    <div class="arena">
        <div class="player-panel">
            <label for="playerAName">玩家 A 名字</label>
            <input id="playerAName" type="text" value="玩家A" maxlength="16">
        </div>
        <canvas id="mazeCanvas" width="700" height="700"></canvas>
        <div class="player-panel">
            <label for="playerBName">玩家 B 名字</label>
            <input id="playerBName" type="text" value="玩家B" maxlength="16">
        </div>
    </div>
    <div class="panel">
        <button type="button" id="resetLevelBtn" class="btn-reset-level">重置关卡</button>
        <button type="button" id="nextLevelBtn" class="btn-next-level">下一关</button>
    </div>
</div>
<script>
    (function () {
        var canvas = document.getElementById("mazeCanvas");
        var ctx = canvas.getContext("2d");
        var playerAInput = document.getElementById("playerAName");
        var playerBInput = document.getElementById("playerBName");
        var levelBadge = document.getElementById("levelBadge");
        var resetLevelBtn = document.getElementById("resetLevelBtn");
        var nextLevelBtn = document.getElementById("nextLevelBtn");
        var MAX_LEVEL = 5;
        var currentLevel = 1;
        /**
         * 难度配色：绿→黄→橙→红。cellRoad 为浅色可走面，cellWall 为同色相的深色实体墙，高对比便于识别。
         */
        var LEVEL_THEMES = {
            1: {
                cellRoad: "#f0faf4",
                cellWall: "#0f3d2a",
                breadcrumbA: "rgba(25, 118, 210, 0.55)",
                breadcrumbB: "rgba(229, 57, 53, 0.55)",
                pageBg: "#e4f3eb",
                canvasBg: "#f0faf4",
                textMain: "#0f291c",
                labelColor: "#1b4332",
                inputBorder: "#8fd4b0",
                canvasBorder: "#2e7d56",
                badgeBg: "rgba(255, 255, 255, 0.95)",
                badgeText: "#0f291c"
            },
            2: {
                cellRoad: "#f6fcec",
                cellWall: "#2d4a18",
                breadcrumbA: "rgba(25, 118, 210, 0.55)",
                breadcrumbB: "rgba(229, 57, 53, 0.55)",
                pageBg: "#edf6df",
                canvasBg: "#f6fcec",
                textMain: "#1e3310",
                labelColor: "#2d4a18",
                inputBorder: "#aed581",
                canvasBorder: "#558b2f",
                badgeBg: "rgba(255, 255, 255, 0.95)",
                badgeText: "#1e3310"
            },
            3: {
                cellRoad: "#fffdf7",
                cellWall: "#6a4a00",
                breadcrumbA: "rgba(21, 101, 192, 0.56)",
                breadcrumbB: "rgba(211, 47, 47, 0.56)",
                pageBg: "#fff6e0",
                canvasBg: "#fffdf7",
                textMain: "#4a3500",
                labelColor: "#5c4200",
                inputBorder: "#ffd54f",
                canvasBorder: "#f9a825",
                badgeBg: "rgba(255, 255, 255, 0.96)",
                badgeText: "#4a3500"
            },
            4: {
                cellRoad: "#fffaf6",
                cellWall: "#7a3a00",
                breadcrumbA: "rgba(13, 71, 161, 0.56)",
                breadcrumbB: "rgba(211, 47, 47, 0.56)",
                pageBg: "#fff0e6",
                canvasBg: "#fffaf6",
                textMain: "#4a2100",
                labelColor: "#5c2800",
                inputBorder: "#ffcc80",
                canvasBorder: "#ef6c00",
                badgeBg: "rgba(255, 255, 255, 0.96)",
                badgeText: "#4a2100"
            },
            5: {
                cellRoad: "#fff8f8",
                cellWall: "#5c1018",
                breadcrumbA: "rgba(25, 118, 210, 0.58)",
                breadcrumbB: "rgba(229, 57, 53, 0.58)",
                pageBg: "#fceaea",
                canvasBg: "#fff8f8",
                textMain: "#3d0a10",
                labelColor: "#6b141c",
                inputBorder: "#ef9a9a",
                canvasBorder: "#c62828",
                badgeBg: "rgba(255, 255, 255, 0.96)",
                badgeText: "#3d0a10"
            }
        };

        function buildActiveTheme(level) {
            var lv = level < 1 ? 1 : (level > MAX_LEVEL ? MAX_LEVEL : level);
            return Object.assign({}, LEVEL_THEMES[lv] || LEVEL_THEMES[1]);
        }

        var activeTheme = buildActiveTheme(1);
        var maze = [];
        var players = {};
        var goal = null;
        var breadcrumbs = {};
        var cellSize = 24;
        var inputLocked = false;
        var winnerMessage = "";
        var keyPressed = {};
        var moveLoopId = null;
        var keyMapping = {
            w: {playerId: "A", direction: "UP"},
            W: {playerId: "A", direction: "UP"},
            s: {playerId: "A", direction: "DOWN"},
            S: {playerId: "A", direction: "DOWN"},
            a: {playerId: "A", direction: "LEFT"},
            A: {playerId: "A", direction: "LEFT"},
            d: {playerId: "A", direction: "RIGHT"},
            D: {playerId: "A", direction: "RIGHT"},
            ArrowUp: {playerId: "B", direction: "UP"},
            ArrowDown: {playerId: "B", direction: "DOWN"},
            ArrowLeft: {playerId: "B", direction: "LEFT"},
            ArrowRight: {playerId: "B", direction: "RIGHT"}
        };

        function init() {
            resetLevelBtn.addEventListener("click", onResetLevelClick);
            nextLevelBtn.addEventListener("click", onNextLevelClick);
            window.addEventListener("keydown", onKeyDown);
            window.addEventListener("keyup", onKeyUp);
            startMoveLoop();
            applyLevelTheme(currentLevel);
            updateNextLevelButton();
            window.addEventListener("resize", function () {
                if (maze && maze.length > 0) {
                    render();
                }
            });
            loadMazeForCurrentLevel();
        }

        function onResetLevelClick() {
            currentLevel = 1;
            applyLevelTheme(currentLevel);
            updateNextLevelButton();
            loadMazeForCurrentLevel();
        }

        function onNextLevelClick() {
            if (currentLevel >= MAX_LEVEL) {
                return;
            }
            currentLevel += 1;
            applyLevelTheme(currentLevel);
            updateNextLevelButton();
            loadMazeForCurrentLevel();
        }

        function updateNextLevelButton() {
            nextLevelBtn.disabled = currentLevel >= MAX_LEVEL;
        }

        function applyLevelTheme(level) {
            var lv = level < 1 ? 1 : (level > MAX_LEVEL ? MAX_LEVEL : level);
            activeTheme = buildActiveTheme(lv);
            var root = document.documentElement;
            root.style.setProperty("--page-bg", activeTheme.pageBg);
            root.style.setProperty("--canvas-bg", activeTheme.canvasBg);
            root.style.setProperty("--text-main", activeTheme.textMain);
            root.style.setProperty("--label-color", activeTheme.labelColor);
            root.style.setProperty("--input-border", activeTheme.inputBorder);
            root.style.setProperty("--canvas-border", activeTheme.canvasBorder);
            root.style.setProperty("--badge-bg", activeTheme.badgeBg);
            root.style.setProperty("--badge-text", activeTheme.badgeText);
            levelBadge.textContent = "Level: " + lv + "/" + MAX_LEVEL;
        }

        function onKeyDown(event) {
            if (inputLocked) {
                return;
            }
            if (keyMapping[event.key]) {
                event.preventDefault();
                keyPressed[event.key] = true;
            }
        }

        function onKeyUp(event) {
            if (keyPressed[event.key]) {
                keyPressed[event.key] = false;
            }
        }

        function startMoveLoop() {
            if (moveLoopId) {
                clearInterval(moveLoopId);
            }
            moveLoopId = setInterval(function () {
                if (inputLocked) {
                    return;
                }
                var actionA = currentDirectionForPlayer("A");
                var actionB = currentDirectionForPlayer("B");
                if (!actionA && !actionB) {
                    return;
                }
                if (actionA && actionB) {
                    Promise.all([move(actionA), move(actionB)]).catch(function () {});
                } else if (actionA) {
                    move(actionA);
                } else {
                    move(actionB);
                }
            }, 95);
        }

        function currentDirectionForPlayer(playerId) {
            var keys = playerId === "A"
                ? ["w", "W", "s", "S", "a", "A", "d", "D"]
                : ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"];
            for (var i = 0; i < keys.length; i++) {
                if (keyPressed[keys[i]]) {
                    return keyMapping[keys[i]];
                }
            }
            return null;
        }

        function loadMazeForCurrentLevel() {
            inputLocked = false;
            winnerMessage = "";
            keyPressed = {};
            fetch("/api/maze/generate", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({level: currentLevel})
            })
            .then(parseJson)
            .then(applyState)
            .catch(function () {});
        }

        function move(action) {
            return fetch("/api/maze/move", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({playerId: action.playerId, direction: action.direction})
            })
            .then(parseJson)
            .then(function (data) {
                if (data.gameOver) {
                    inputLocked = true;
                    winnerMessage = getWinnerMessage(data.winner);
                }
                applyState(data);
            })
            .catch(function () {});
        }

        function applyState(data) {
            if (typeof data.level === "number") {
                currentLevel = data.level;
                applyLevelTheme(currentLevel);
                updateNextLevelButton();
            }
            if (data.maze) {
                maze = data.maze;
            }
            players = data.players || {};
            goal = data.goal;
            breadcrumbs = data.breadcrumbs || {};
            render();
        }

        function parseJson(response) {
            if (!response.ok) {
                throw new Error("request failed");
            }
            return response.json();
        }

        function alignCanvasBufferToDisplay() {
            var rect = canvas.getBoundingClientRect();
            var cssW = Math.floor(rect.width);
            var cssH = Math.floor(rect.height);
            if (cssW < 16 || cssH < 16) {
                cssW = 700;
                cssH = 700;
            }
            canvas._layoutCssW = cssW;
            canvas._layoutCssH = cssH;
            var dpr = window.devicePixelRatio || 1;
            var bufW = Math.max(1, Math.floor(cssW * dpr));
            var bufH = Math.max(1, Math.floor(cssH * dpr));
            if (canvas.width !== bufW || canvas.height !== bufH) {
                canvas.width = bufW;
                canvas.height = bufH;
            }
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function render() {
            if (!maze || maze.length === 0) {
                return;
            }
            var rows = maze.length;
            var cols = maze[0].length;
            alignCanvasBufferToDisplay();
            var lw = canvas._layoutCssW;
            var lh = canvas._layoutCssH;
            cellSize = Math.floor(Math.min(lw / cols, lh / rows));
            ctx.clearRect(0, 0, lw, lh);

            drawMazeSeamless(rows, cols, lw, lh);
            drawBreadcrumbs();
            drawGoal();
            drawPlayers();
            drawWinnerOverlay();
        }

        /**
         * 1) 整幅浅色道路底色；2) 深色墙体每格宽高 +1px 且坐标取整，消除亚像素缝隙；
         * 绘制在 CSS 像素坐标系下（与高 DPR 缓冲对齐）。
         */
        function drawMazeSeamless(rows, cols, lw, lh) {
            var x;
            var y;
            ctx.fillStyle = activeTheme.cellRoad;
            ctx.fillRect(0, 0, lw, lh);
            ctx.fillStyle = activeTheme.cellWall;
            var wallSpan = cellSize + 1;
            for (y = 0; y < rows; y++) {
                for (x = 0; x < cols; x++) {
                    if ((maze[y][x] & 2) === 2) {
                        var px = Math.floor(x * cellSize);
                        var py = Math.floor(y * cellSize);
                        ctx.fillRect(px, py, wallSpan, wallSpan);
                    }
                }
            }
        }

        function drawBreadcrumbs() {
            drawPlayerBreadcrumb("A", activeTheme.breadcrumbA);
            drawPlayerBreadcrumb("B", activeTheme.breadcrumbB);
        }

        function drawPlayerBreadcrumb(playerId, color) {
            var path = breadcrumbs[playerId] || [];
            ctx.fillStyle = color;
            for (var i = 0; i < path.length; i++) {
                var p = path[i];
                ctx.beginPath();
                ctx.arc(p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2, cellSize / 8, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawGoal() {
            if (!goal) {
                return;
            }
            var cx = goal.x * cellSize + cellSize / 2;
            var cy = goal.y * cellSize + cellSize / 2;
            var trophySize = cellSize * 0.9;

            // 绘制金色发光背景
            ctx.save();
            ctx.shadowColor = "rgba(255, 215, 0, 0.8)";
            ctx.shadowBlur = 15;
            ctx.fillStyle = "rgba(255, 215, 0, 0.3)";
            ctx.beginPath();
            ctx.arc(cx, cy, cellSize / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // 绘制奖杯 emoji，更大更显眼
            ctx.font = Math.floor(trophySize) + "px serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🏆", cx, cy + cellSize * 0.05);
        }

        function drawPlayers() {
            var playerA = players.A;
            var playerB = players.B;
            if (playerA && playerB && playerA.x === playerB.x && playerA.y === playerB.y) {
                drawOverlappedPlayers(playerA);
                return;
            }
            drawPlayer("A", "#2f80ed");
            drawPlayer("B", "#eb5757");
        }

        function drawPlayer(playerId, color) {
            var p = players[playerId];
            if (!p) {
                return;
            }
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(p.x * cellSize + cellSize / 2, p.y * cellSize + cellSize / 2, cellSize / 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawOverlappedPlayers(position) {
            var cx = position.x * cellSize + cellSize / 2;
            var cy = position.y * cellSize + cellSize / 2;
            var splitOffset = cellSize * 0.18;
            var radius = cellSize / 3.3;

            ctx.fillStyle = "#2f80ed";
            ctx.beginPath();
            ctx.arc(cx - splitOffset, cy, radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#eb5757";
            ctx.beginPath();
            ctx.arc(cx + splitOffset, cy, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawWinnerOverlay() {
            if (!winnerMessage) {
                return;
            }
            var w = canvas.clientWidth;
            var h = canvas.clientHeight;
            var cx = w / 2;
            var cy = h / 2;
            var fontSize = Math.max(26, Math.min(42, Math.floor(Math.min(w, h) / 18)));

            ctx.save();
            ctx.fillStyle = "rgba(6, 8, 14, 0.78)";
            ctx.fillRect(0, 0, w, h);

            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = "bold " + fontSize + "px Arial, sans-serif";
            ctx.lineJoin = "round";
            ctx.lineWidth = 6;
            ctx.strokeStyle = "rgba(0, 0, 0, 0.62)";
            ctx.strokeText(winnerMessage, cx, cy);
            ctx.shadowColor = "rgba(255, 213, 79, 0.85)";
            ctx.shadowBlur = 20;
            ctx.fillStyle = "#fffde7";
            ctx.fillText(winnerMessage, cx, cy);
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function getWinnerMessage(winnerId) {
            var name = winnerId === "A" ? playerAInput.value : playerBInput.value;
            var safeName = (name || "").trim();
            if (!safeName) {
                safeName = winnerId === "A" ? "玩家A" : "玩家B";
            }
            return safeName + " 获得了胜利！";
        }

        init();
    })();
</script>
</body>
</html>
