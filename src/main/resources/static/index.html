<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人迷宫竞技</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="modeSelectorOverlay" class="mode-selector-overlay">
    <div class="mode-selector-dialog">
        <h2>选择游戏模式</h2>
        <p>请选择一场冒险：双人竞速冲向奖杯，或开启抓人追逃对决。</p>
        <div class="mode-actions">
            <button type="button" id="modeTwinRaceBtn" class="btn-mode-race">模式 A：双人迷宫 (Twin Race)</button>
            <button type="button" id="modeChaseBtn" class="btn-mode-chase">模式 B：抓人游戏 (The Chase)</button>
        </div>
        <div class="mode-note">提示：重置关卡会按当前模式重新开局，不会返回此选择界面。</div>
    </div>
</div>
<div class="game">
    <div id="levelBadge" class="level-badge">Level: 1/5</div>
    <div class="arena">
        <div class="player-panel">
            <label for="playerAName">玩家 A 名字</label>
            <input id="playerAName" type="text" value="玩家A" maxlength="16">
            <div id="playerAScore" class="player-score">胜场：0</div>
        </div>
        <canvas id="mazeCanvas" width="700" height="700"></canvas>
        <div class="player-panel">
            <label for="playerBName">玩家 B 名字</label>
            <input id="playerBName" type="text" value="玩家B" maxlength="16">
            <div id="playerBScore" class="player-score">胜场：0</div>
        </div>
    </div>
    <div class="panel">
        <button type="button" id="resetLevelBtn" class="btn-reset-level">重置关卡</button>
        <button type="button" id="nextLevelBtn" class="btn-next-level">下一关</button>
    </div>
    <div id="chaseControls" class="chase-controls hidden">
        <button type="button" id="toggleChaserBtn" class="btn-toggle-chaser">切换为红色方抓人</button>
        <div id="chaseStatus" class="chase-status">当前抓人方：蓝色方</div>
    </div>
</div>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/renderer.js"></script>
<script src="js/game.js"></script>
</body>
</html>
